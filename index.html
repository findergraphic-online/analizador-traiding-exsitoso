<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Journal Pro</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-icon" id="logo-icon">T</div>
      <div>
        <div class="logo-text">Trading Journal</div>
        <div class="logo-sub" id="logo-mode-badge">● BACKTEST</div>
      </div>
    </div>

    <!-- MODE SWITCHER -->
    <div class="mode-switcher">
      <button class="mode-btn active" id="btn-backtest" onclick="switchMode('backtest')">📊 Backtest</button>
      <button class="mode-btn" id="btn-real" onclick="switchMode('real')">💹 Real</button>
    </div>

    <nav>
      <div class="nav-section">Principal</div>
      <button class="nav-btn active" data-page="dashboard" onclick="showPage('dashboard')"><span class="nav-icon">📊</span>Dashboard</button>
      <button class="nav-btn" data-page="trades" onclick="showPage('trades')"><span class="nav-icon">📋</span>Operaciones</button>
      <button class="nav-btn" data-page="add-trade" onclick="showPage('add-trade')"><span class="nav-icon">➕</span>Nueva Operación</button>
      <div class="nav-section">Análisis</div>
      <button class="nav-btn" data-page="charts-library" onclick="showPage('charts-library')"><span class="nav-icon">🖼️</span>Biblioteca Charts</button>
      <button class="nav-btn" data-page="weekly" onclick="showPage('weekly')"><span class="nav-icon">📅</span>Semanal</button>
      <button class="nav-btn" data-page="monthly" onclick="showPage('monthly')"><span class="nav-icon">🗓️</span>Mensual</button>
      <button class="nav-btn" data-page="compare" onclick="showPage('compare')"><span class="nav-icon">⚖️</span>Comparar</button>
      <div class="nav-section">Configuración</div>
      <button class="nav-btn" data-page="strategies" onclick="showPage('strategies')"><span class="nav-icon">🎯</span>Estrategias</button>
      <button class="nav-btn" data-page="settings" onclick="showPage('settings')"><span class="nav-icon">⚙️</span>Ajustes</button>
    </nav>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <h1 id="page-title">Dashboard</h1>
      <div class="mode-badge" id="topbar-mode-badge">BACKTEST</div>
      <div class="filter-bar">
        <select id="filter-strategy" onchange="applyFilters()"><option value="">Todas las estrategias</option></select>
        <select id="filter-month" onchange="applyFilters()"><option value="">Todos los meses</option></select>
        <button class="btn btn-secondary btn-sm" onclick="exportCSV()">⬇ CSV</button>
        <button class="btn btn-secondary btn-sm" onclick="exportJSON()">⬇ JSON</button>
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('import-json-input').click()">⬆ JSON</button>
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('import-csv-input').click()">⬆ CSV/MT4</button>
        <input type="file" id="import-json-input" accept=".json" style="display:none" onchange="importJSON(event)">
        <input type="file" id="import-csv-input" accept=".csv,.txt" style="display:none" onchange="importCSV(event)">
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- MODAL TRADE -->
<div class="modal-bg hidden" id="modal-trade-bg">
  <div class="modal" id="modal-trade">
    <h2><span id="modal-trade-title">Nueva Operación</span><button class="modal-close" onclick="closeTradeModal()">×</button></h2>
    <div id="modal-trade-form"></div>
    <div class="btn-bar">
      <button class="btn btn-primary" onclick="saveTradeFromModal()">💾 Guardar</button>
      <button class="btn btn-secondary" onclick="closeTradeModal()">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL IMAGEN AMPLIADA -->
<div class="modal-bg hidden" id="modal-img-bg" onclick="closeImgModal()">
  <div class="modal-img-wrap" onclick="event.stopPropagation()">
    <button class="modal-close" style="position:absolute;top:12px;right:12px;z-index:10;background:var(--bg2);border:1px solid var(--border2);border-radius:50%;width:32px;height:32px;font-size:18px" onclick="closeImgModal()">×</button>
    <img id="modal-img-src" style="max-width:90vw;max-height:85vh;border-radius:8px;display:block">
    <div id="modal-img-caption" style="text-align:center;margin-top:8px;color:var(--text2);font-size:13px"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
